<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="100%" style="max-width: 720px; height: auto; font-family: 'Helvetica Neue', Arial, sans-serif;">

  <defs>
    <linearGradient id="resBody1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e8c79a"/>
      <stop offset="100%" stop-color="#b8915a"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="720" height="560" fill="#fdfcf6"/>

  <!-- ===================== ARDUINO UNO (oben, vereinfacht) ===================== -->
  <g id="arduino" transform="translate(180, 30)">
    <rect x="0" y="0" width="360" height="120" rx="10" fill="#00979d" stroke="#005c61" stroke-width="2"/>
    <rect x="355" y="20" width="35" height="30" fill="#9ea7ac" stroke="#444" stroke-width="1.5"/>
    <text x="180" y="40" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15" letter-spacing="2">ARDUINO UNO</text>
    <text x="180" y="58" text-anchor="middle" fill="#cfeeed" font-size="10">(nur als 5V- und GND-Quelle)</text>

    <!-- Pin-Labels INNEN am Arduino-Body, OBERHALB der Pin-Boxen (wie in L3) -->
    <g font-size="12" font-weight="bold" text-anchor="middle">
      <text x="74" y="95" fill="#ff8a8a">5V</text>
      <text x="114" y="95" fill="#eeeeee">GND</text>
    </g>

    <!-- Pin-Leiste unten (vereinfacht), 5V und GND deutlich markiert -->
    <rect x="20" y="115" width="320" height="13" fill="#1a1a1a"/>
    <g fill="#3a3a3a">
      <rect x="30" y="117" width="9" height="10"/>
      <rect x="50" y="117" width="9" height="10"/>
      <rect x="70" y="117" width="9" height="10"/>
      <rect x="90" y="117" width="9" height="10"/>
      <rect x="110" y="117" width="9" height="10"/>
      <rect x="130" y="117" width="9" height="10"/>
      <rect x="150" y="117" width="9" height="10"/>
      <rect x="170" y="117" width="9" height="10"/>
      <rect x="190" y="117" width="9" height="10"/>
      <rect x="210" y="117" width="9" height="10"/>
      <rect x="230" y="117" width="9" height="10"/>
      <rect x="250" y="117" width="9" height="10"/>
      <rect x="270" y="117" width="9" height="10"/>
      <rect x="290" y="117" width="9" height="10"/>
      <rect x="310" y="117" width="9" height="10"/>
    </g>

    <!-- 5V-Pin markiert (rot) -->
    <rect x="69" y="116" width="11" height="12" fill="#d62828" stroke="#fff" stroke-width="1"/>
    <!-- GND-Pin markiert (schwarz mit weisser Schrift) -->
    <rect x="109" y="116" width="11" height="12" fill="#222" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ===================== JUMPER-KABEL Arduino -> Breadboard ===================== -->
  <!-- Rotes Kabel: 5V (Arduino x=180+74=254) -> Breadboard +Schiene (x=120, y=240) -->
  <path d="M 254 180 L 254 220 L 120 220 L 120 240" stroke="#d62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="254" cy="180" r="3.5" fill="#d62828"/>
  <circle cx="120" cy="240" r="3.5" fill="#d62828"/>

  <!-- Schwarzes Kabel: GND (Arduino x=180+114=294) -> Breadboard -Schiene (x=120, y=440) -->
  <path d="M 294 180 L 294 200 L 90 200 L 90 440 L 120 440" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="294" cy="180" r="3.5" fill="#222"/>
  <circle cx="120" cy="440" r="3.5" fill="#222"/>

  <!-- ===================== BREADBOARD ===================== -->
  <g id="breadboard" transform="translate(60, 230)">
    <rect x="0" y="0" width="640" height="230" rx="6" fill="#f0ede6" stroke="#c8c3b8" stroke-width="1.5"/>

    <!-- +Schiene oben (rot) -->
    <rect x="20" y="10" width="600" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.7"/>
    <text x="12" y="20" font-size="11" font-weight="bold" fill="#EF4444">+</text>

    <!-- -Schiene unten (blau) -->
    <rect x="20" y="206" width="600" height="14" rx="2" fill="#BFDBFE" stroke="#3B82F6" stroke-width="0.7"/>
    <text x="12" y="217" font-size="11" font-weight="bold" fill="#3B82F6">&#8722;</text>

    <!-- Spaltennummern (1-25 visualisiert, x=40 bis x=600, Schritt=20+small offset) -->
    <g font-size="8" fill="#888" text-anchor="middle">
      <text x="40" y="38">1</text>
      <text x="60" y="38">2</text>
      <text x="80" y="38">3</text>
      <text x="100" y="38">4</text>
      <text x="120" y="38">5</text>
      <text x="140" y="38">6</text>
      <text x="160" y="38">7</text>
      <text x="180" y="38">8</text>
      <text x="200" y="38">9</text>
      <text x="220" y="38">10</text>
      <text x="240" y="38">11</text>
      <text x="260" y="38">12</text>
      <text x="280" y="38">13</text>
      <text x="300" y="38">14</text>
      <text x="320" y="38">15</text>
      <text x="340" y="38">16</text>
    </g>

    <!-- Reihen-Beschriftung -->
    <g font-size="9" fill="#999">
      <text x="12" y="50">a</text>
      <text x="12" y="68">b</text>
      <text x="12" y="86">c</text>
      <text x="12" y="104">d</text>
      <text x="12" y="122">e</text>
      <text x="12" y="146">f</text>
      <text x="12" y="164">g</text>
      <text x="12" y="182">h</text>
      <text x="12" y="200">i</text>
    </g>

    <!-- Loecher obere Halbinsel (Reihen a-e, Spalten 1-16) -->
    <g fill="#cbcbcb">
      <!-- Reihe a (y=47) -->
      <circle cx="40" cy="47" r="2"/><circle cx="60" cy="47" r="2"/><circle cx="80" cy="47" r="2"/><circle cx="100" cy="47" r="2"/><circle cx="120" cy="47" r="2"/><circle cx="140" cy="47" r="2"/><circle cx="160" cy="47" r="2"/><circle cx="180" cy="47" r="2"/><circle cx="200" cy="47" r="2"/><circle cx="220" cy="47" r="2"/><circle cx="240" cy="47" r="2"/><circle cx="260" cy="47" r="2"/><circle cx="280" cy="47" r="2"/><circle cx="300" cy="47" r="2"/><circle cx="320" cy="47" r="2"/><circle cx="340" cy="47" r="2"/>
      <!-- Reihe b (y=65) -->
      <circle cx="40" cy="65" r="2"/><circle cx="60" cy="65" r="2"/><circle cx="80" cy="65" r="2"/><circle cx="100" cy="65" r="2"/><circle cx="120" cy="65" r="2"/><circle cx="140" cy="65" r="2"/><circle cx="160" cy="65" r="2"/><circle cx="180" cy="65" r="2"/><circle cx="200" cy="65" r="2"/><circle cx="220" cy="65" r="2"/><circle cx="240" cy="65" r="2"/><circle cx="260" cy="65" r="2"/><circle cx="280" cy="65" r="2"/><circle cx="300" cy="65" r="2"/><circle cx="320" cy="65" r="2"/><circle cx="340" cy="65" r="2"/>
      <!-- Reihe c (y=83) -->
      <circle cx="40" cy="83" r="2"/><circle cx="60" cy="83" r="2"/><circle cx="80" cy="83" r="2"/><circle cx="100" cy="83" r="2"/><circle cx="120" cy="83" r="2"/><circle cx="140" cy="83" r="2"/><circle cx="160" cy="83" r="2"/><circle cx="180" cy="83" r="2"/><circle cx="200" cy="83" r="2"/><circle cx="220" cy="83" r="2"/><circle cx="240" cy="83" r="2"/><circle cx="260" cy="83" r="2"/><circle cx="280" cy="83" r="2"/><circle cx="300" cy="83" r="2"/><circle cx="320" cy="83" r="2"/><circle cx="340" cy="83" r="2"/>
      <!-- Reihe d (y=101) -->
      <circle cx="40" cy="101" r="2"/><circle cx="60" cy="101" r="2"/><circle cx="80" cy="101" r="2"/><circle cx="100" cy="101" r="2"/><circle cx="120" cy="101" r="2"/><circle cx="140" cy="101" r="2"/><circle cx="160" cy="101" r="2"/><circle cx="180" cy="101" r="2"/><circle cx="200" cy="101" r="2"/><circle cx="220" cy="101" r="2"/><circle cx="240" cy="101" r="2"/><circle cx="260" cy="101" r="2"/><circle cx="280" cy="101" r="2"/><circle cx="300" cy="101" r="2"/><circle cx="320" cy="101" r="2"/><circle cx="340" cy="101" r="2"/>
      <!-- Reihe e (y=119) -->
      <circle cx="40" cy="119" r="2"/><circle cx="60" cy="119" r="2"/><circle cx="80" cy="119" r="2"/><circle cx="100" cy="119" r="2"/><circle cx="120" cy="119" r="2"/><circle cx="140" cy="119" r="2"/><circle cx="160" cy="119" r="2"/><circle cx="180" cy="119" r="2"/><circle cx="200" cy="119" r="2"/><circle cx="220" cy="119" r="2"/><circle cx="240" cy="119" r="2"/><circle cx="260" cy="119" r="2"/><circle cx="280" cy="119" r="2"/><circle cx="300" cy="119" r="2"/><circle cx="320" cy="119" r="2"/><circle cx="340" cy="119" r="2"/>
    </g>

    <!-- Mittelluecke-Strich -->
    <line x1="20" y1="138" x2="620" y2="138" stroke="#d0ccc0" stroke-width="0.7" stroke-dasharray="2 3"/>

    <!-- Loecher untere Halbinsel (Reihen f-j, nur Spalten 1-16) -->
    <g fill="#cbcbcb">
      <circle cx="40" cy="146" r="2"/><circle cx="60" cy="146" r="2"/><circle cx="80" cy="146" r="2"/><circle cx="100" cy="146" r="2"/><circle cx="120" cy="146" r="2"/><circle cx="140" cy="146" r="2"/><circle cx="160" cy="146" r="2"/><circle cx="180" cy="146" r="2"/><circle cx="200" cy="146" r="2"/><circle cx="220" cy="146" r="2"/><circle cx="240" cy="146" r="2"/><circle cx="260" cy="146" r="2"/><circle cx="280" cy="146" r="2"/><circle cx="300" cy="146" r="2"/><circle cx="320" cy="146" r="2"/><circle cx="340" cy="146" r="2"/>
      <circle cx="40" cy="164" r="2"/><circle cx="60" cy="164" r="2"/><circle cx="80" cy="164" r="2"/><circle cx="100" cy="164" r="2"/><circle cx="120" cy="164" r="2"/><circle cx="140" cy="164" r="2"/><circle cx="160" cy="164" r="2"/><circle cx="180" cy="164" r="2"/><circle cx="200" cy="164" r="2"/><circle cx="220" cy="164" r="2"/><circle cx="240" cy="164" r="2"/><circle cx="260" cy="164" r="2"/><circle cx="280" cy="164" r="2"/><circle cx="300" cy="164" r="2"/><circle cx="320" cy="164" r="2"/><circle cx="340" cy="164" r="2"/>
      <circle cx="40" cy="182" r="2"/><circle cx="60" cy="182" r="2"/><circle cx="80" cy="182" r="2"/><circle cx="100" cy="182" r="2"/><circle cx="120" cy="182" r="2"/><circle cx="140" cy="182" r="2"/><circle cx="160" cy="182" r="2"/><circle cx="180" cy="182" r="2"/><circle cx="200" cy="182" r="2"/><circle cx="220" cy="182" r="2"/><circle cx="240" cy="182" r="2"/><circle cx="260" cy="182" r="2"/><circle cx="280" cy="182" r="2"/><circle cx="300" cy="182" r="2"/><circle cx="320" cy="182" r="2"/><circle cx="340" cy="182" r="2"/>
      <circle cx="40" cy="200" r="2"/><circle cx="60" cy="200" r="2"/><circle cx="80" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="120" cy="200" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="160" cy="200" r="2"/><circle cx="180" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="220" cy="200" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="260" cy="200" r="2"/><circle cx="280" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="320" cy="200" r="2"/><circle cx="340" cy="200" r="2"/>
    </g>

    <!-- ===== Highlight Spalte 8: gemeinsamer Knoten M (Reihen a-e elektrisch verbunden) ===== -->
    <rect x="174" y="44" width="12" height="78" rx="2" fill="#FEF3C7" opacity="0.65" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="180" y="26" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">M = Spalte 8</text>
    <text x="180" y="38" text-anchor="middle" font-size="7" font-style="italic" fill="#B45309">(alle Löcher a–e verbunden)</text>

    <!-- ===== Verbindungs-Jumper: +Schiene -> Spalte 3 (a3) ===== -->
    <line x1="80" y1="24" x2="80" y2="47" stroke="#d62828" stroke-width="2.5"/>
    <circle cx="80" cy="24" r="2.5" fill="#d62828"/>
    <circle cx="80" cy="47" r="2.5" fill="#d62828"/>

    <!-- ===== Verbindungs-Jumper: Spalte 13 (a13) -> -Schiene ===== -->
    <line x1="280" y1="47" x2="280" y2="206" stroke="#222" stroke-width="2.5"/>
    <circle cx="280" cy="47" r="2.5" fill="#222"/>
    <circle cx="280" cy="206" r="2.5" fill="#222"/>

    <!-- ===== R1: horizontal in Reihe b, von b3 (x=80) nach b8 (x=180) ===== -->
    <line x1="80" y1="65" x2="90" y2="65" stroke="#888" stroke-width="1.5"/>
    <line x1="170" y1="65" x2="180" y2="65" stroke="#888" stroke-width="1.5"/>
    <rect x="90" y="58" width="80" height="14" rx="3" fill="url(#resBody1)" stroke="#7d5a29" stroke-width="1"/>
    <!-- Farbringe 10k = braun-schwarz-orange + gold (Toleranz) -->
    <rect x="100" y="58" width="3" height="14" fill="#8d6e63"/>
    <rect x="108" y="58" width="3" height="14" fill="#222"/>
    <rect x="116" y="58" width="3" height="14" fill="#ff7043"/>
    <rect x="158" y="58" width="3" height="14" fill="#c9b037"/>
    <circle cx="80" cy="65" r="2.5" fill="#7d5a29"/>
    <circle cx="180" cy="65" r="2.5" fill="#7d5a29"/>
    <text x="130" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#5d4118">R&#8321; = 10 k&#937;</text>

    <!-- ===== R2: horizontal in Reihe d, von d8 (x=180) nach d13 (x=280) ===== -->
    <line x1="180" y1="101" x2="190" y2="101" stroke="#888" stroke-width="1.5"/>
    <line x1="270" y1="101" x2="280" y2="101" stroke="#888" stroke-width="1.5"/>
    <rect x="190" y="94" width="80" height="14" rx="3" fill="url(#resBody1)" stroke="#7d5a29" stroke-width="1"/>
    <rect x="200" y="94" width="3" height="14" fill="#8d6e63"/>
    <rect x="208" y="94" width="3" height="14" fill="#222"/>
    <rect x="216" y="94" width="3" height="14" fill="#ff7043"/>
    <rect x="258" y="94" width="3" height="14" fill="#c9b037"/>
    <circle cx="180" cy="101" r="2.5" fill="#7d5a29"/>
    <circle cx="280" cy="101" r="2.5" fill="#7d5a29"/>
    <text x="230" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#5d4118">R&#8322; = 10 k&#937;</text>

    <!-- ===== Multimeter-Anschlusspunkte ===== -->
    <!-- Rote Messspitze an e8 (Knotenpunkt M, Spalte 8) -->
    <circle cx="180" cy="119" r="4" fill="#d62828" stroke="#fff" stroke-width="1.5"/>
    <text x="195" y="116" text-anchor="start" font-size="7" font-weight="bold" fill="#d62828">rote Spitze (V)</text>
    <!-- Schwarze Messspitze an -Schiene (Spalte 16) -->
    <circle cx="340" cy="213" r="4" fill="#222" stroke="#fff" stroke-width="1.5"/>
    <text x="355" y="216" text-anchor="start" font-size="7" font-weight="bold" fill="#222">schwarze Spitze (COM)</text>

    <!-- Breadboard-Label UNTER dem Breadboard (Style-Guide §6) -->
    <text x="320" y="244" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">Breadboard (32 Spalten)</text>
  </g>

  <!-- ===================== MULTIMETER (rechts) ===================== -->
  <g id="multimeter" transform="translate(540, 360)">
    <rect x="0" y="0" width="150" height="150" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
    <rect x="10" y="10" width="130" height="35" rx="3" fill="#1f2937"/>
    <text x="75" y="33" text-anchor="middle" font-size="16" font-weight="bold" fill="#34d399" font-family="monospace">2.50 V</text>
    <text x="75" y="60" text-anchor="middle" font-size="10" fill="#92400e">Multimeter (Gleichspg.)</text>
    <!-- Knopf -->
    <circle cx="75" cy="85" r="14" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
    <text x="75" y="89" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">V=</text>
    <!-- Buchsen -->
    <circle cx="35" cy="118" r="5" fill="#d62828"/>
    <circle cx="115" cy="118" r="5" fill="#222"/>
    <text x="35" y="138" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">V&#8486;</text>
    <text x="115" y="138" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">COM</text>
  </g>

  <!-- Multimeter-Leitungen zum Breadboard (rot zum Knoten M = Sp.8, schwarz zur -Schiene)
       Die Kurven verlaufen unten am Breadboard vorbei und steigen senkrecht in die Spitze,
       damit die Spitzen-Labels nicht überdeckt werden -->
  <path d="M 575 478 C 575 500, 240 500, 240 349" stroke="#d62828" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M 655 478 C 655 510, 400 510, 400 443" stroke="#222" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>

  <!-- Hinweis-Text -->
  <text x="360" y="548" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Erwartungswert: U&#8322; &#8776; 2,5 V (beide Widerstaende gleich gross &#8594; halbe Versorgungsspannung)</text>
</svg>
