<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="100%" style="max-width: 720px; height: auto; font-family: 'Helvetica Neue', Arial, sans-serif;">

  <defs>
    <linearGradient id="servoBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="servoArm" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="720" height="540" fill="#fdfcf6"/>

  <!-- ===================== ARDUINO UNO ===================== -->
  <g id="arduino" transform="translate(180, 30)">
    <rect x="0" y="0" width="360" height="120" rx="10" fill="#00979d" stroke="#005c61" stroke-width="2"/>
    <rect x="355" y="20" width="35" height="30" fill="#9ea7ac" stroke="#444" stroke-width="1.5"/>
    <text x="180" y="68" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15" letter-spacing="2">ARDUINO UNO</text>
    <text x="180" y="88" text-anchor="middle" fill="#cfeeed" font-size="11">5V &middot; GND &middot; Pin 9 werden genutzt</text>

    <!-- Pin-Leiste unten -->
    <rect x="20" y="115" width="320" height="13" fill="#1a1a1a"/>
    <g fill="#3a3a3a">
      <rect x="30" y="117" width="9" height="10"/>
      <rect x="50" y="117" width="9" height="10"/>
      <rect x="70" y="117" width="9" height="10"/>
      <rect x="90" y="117" width="9" height="10"/>
      <rect x="110" y="117" width="9" height="10"/>
      <rect x="130" y="117" width="9" height="10"/>
      <rect x="150" y="117" width="9" height="10"/>
      <rect x="170" y="117" width="9" height="10"/>
      <rect x="190" y="117" width="9" height="10"/>
      <rect x="210" y="117" width="9" height="10"/>
      <rect x="230" y="117" width="9" height="10"/>
      <rect x="250" y="117" width="9" height="10"/>
      <rect x="270" y="117" width="9" height="10"/>
      <rect x="290" y="117" width="9" height="10"/>
      <rect x="310" y="117" width="9" height="10"/>
    </g>

    <!-- 5V markiert (rot) -->
    <rect x="69" y="116" width="11" height="12" fill="#d62828" stroke="#fff" stroke-width="1"/>
    <text x="74" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#d62828">5V</text>

    <!-- GND markiert (schwarz) -->
    <rect x="109" y="116" width="11" height="12" fill="#222" stroke="#fff" stroke-width="1"/>
    <text x="114" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">GND</text>

    <!-- Pin 9 markiert (orange) -->
    <rect x="209" y="116" width="11" height="12" fill="#E67E22" stroke="#fff" stroke-width="1"/>
    <text x="214" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#E67E22">Pin 9</text>
  </g>

  <!-- ===================== JUMPER-KABEL ===================== -->
  <!-- Rotes Kabel: Arduino-5V -> +Schiene -->
  <path d="M 254 180 L 254 215 L 120 215 L 120 240" stroke="#d62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="254" cy="180" r="3.5" fill="#d62828"/>
  <circle cx="120" cy="240" r="3.5" fill="#d62828"/>

  <!-- Schwarzes Kabel: GND -> -Schiene -->
  <path d="M 294 180 L 294 200 L 90 200 L 90 440 L 120 440" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="294" cy="180" r="3.5" fill="#222"/>
  <circle cx="120" cy="440" r="3.5" fill="#222"/>

  <!-- Oranges Kabel: Pin 9 -> Servo-Signal-Spalte am Breadboard (Spalte 10) -->
  <path d="M 394 180 L 394 220 L 260 220 L 260 295" stroke="#E67E22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="394" cy="180" r="3.5" fill="#E67E22"/>
  <circle cx="260" cy="295" r="3.5" fill="#E67E22"/>

  <!-- ===================== BREADBOARD ===================== -->
  <g id="breadboard" transform="translate(60, 230)">
    <rect x="0" y="0" width="640" height="230" rx="6" fill="#f0ede6" stroke="#c8c3b8" stroke-width="1.5"/>

    <!-- +Schiene oben (rot) -->
    <rect x="20" y="10" width="600" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.7"/>
    <text x="12" y="20" font-size="11" font-weight="bold" fill="#EF4444">+</text>

    <!-- -Schiene unten (blau) -->
    <rect x="20" y="206" width="600" height="14" rx="2" fill="#BFDBFE" stroke="#3B82F6" stroke-width="0.7"/>
    <text x="12" y="217" font-size="11" font-weight="bold" fill="#3B82F6">&#8722;</text>

    <!-- Spaltennummern -->
    <g font-size="8" fill="#888" text-anchor="middle">
      <text x="40" y="38">1</text>
      <text x="60" y="38">2</text>
      <text x="80" y="38">3</text>
      <text x="100" y="38">4</text>
      <text x="120" y="38">5</text>
      <text x="140" y="38">6</text>
      <text x="160" y="38">7</text>
      <text x="180" y="38">8</text>
      <text x="200" y="38">9</text>
      <text x="220" y="38">10</text>
      <text x="240" y="38">11</text>
      <text x="260" y="38">12</text>
      <text x="280" y="38">13</text>
    </g>

    <!-- Reihen-Beschriftung -->
    <g font-size="9" fill="#999">
      <text x="12" y="50">a</text>
      <text x="12" y="68">b</text>
      <text x="12" y="86">c</text>
      <text x="12" y="104">d</text>
      <text x="12" y="122">e</text>
    </g>

    <!-- Loecher obere Halbinsel (Spalten 1-13) -->
    <g fill="#cbcbcb">
      <circle cx="40" cy="47" r="2"/><circle cx="60" cy="47" r="2"/><circle cx="80" cy="47" r="2"/><circle cx="100" cy="47" r="2"/><circle cx="120" cy="47" r="2"/><circle cx="140" cy="47" r="2"/><circle cx="160" cy="47" r="2"/><circle cx="180" cy="47" r="2"/><circle cx="200" cy="47" r="2"/><circle cx="220" cy="47" r="2"/><circle cx="240" cy="47" r="2"/><circle cx="260" cy="47" r="2"/><circle cx="280" cy="47" r="2"/>
      <circle cx="40" cy="65" r="2"/><circle cx="60" cy="65" r="2"/><circle cx="80" cy="65" r="2"/><circle cx="100" cy="65" r="2"/><circle cx="120" cy="65" r="2"/><circle cx="140" cy="65" r="2"/><circle cx="160" cy="65" r="2"/><circle cx="180" cy="65" r="2"/><circle cx="200" cy="65" r="2"/><circle cx="220" cy="65" r="2"/><circle cx="240" cy="65" r="2"/><circle cx="260" cy="65" r="2"/><circle cx="280" cy="65" r="2"/>
      <circle cx="40" cy="83" r="2"/><circle cx="60" cy="83" r="2"/><circle cx="80" cy="83" r="2"/><circle cx="100" cy="83" r="2"/><circle cx="120" cy="83" r="2"/><circle cx="140" cy="83" r="2"/><circle cx="160" cy="83" r="2"/><circle cx="180" cy="83" r="2"/><circle cx="200" cy="83" r="2"/><circle cx="220" cy="83" r="2"/><circle cx="240" cy="83" r="2"/><circle cx="260" cy="83" r="2"/><circle cx="280" cy="83" r="2"/>
      <circle cx="40" cy="101" r="2"/><circle cx="60" cy="101" r="2"/><circle cx="80" cy="101" r="2"/><circle cx="100" cy="101" r="2"/><circle cx="120" cy="101" r="2"/><circle cx="140" cy="101" r="2"/><circle cx="160" cy="101" r="2"/><circle cx="180" cy="101" r="2"/><circle cx="200" cy="101" r="2"/><circle cx="220" cy="101" r="2"/><circle cx="240" cy="101" r="2"/><circle cx="260" cy="101" r="2"/><circle cx="280" cy="101" r="2"/>
      <circle cx="40" cy="119" r="2"/><circle cx="60" cy="119" r="2"/><circle cx="80" cy="119" r="2"/><circle cx="100" cy="119" r="2"/><circle cx="120" cy="119" r="2"/><circle cx="140" cy="119" r="2"/><circle cx="160" cy="119" r="2"/><circle cx="180" cy="119" r="2"/><circle cx="200" cy="119" r="2"/><circle cx="220" cy="119" r="2"/><circle cx="240" cy="119" r="2"/><circle cx="260" cy="119" r="2"/><circle cx="280" cy="119" r="2"/>
    </g>

    <!-- Mittelluecke -->
    <line x1="20" y1="138" x2="620" y2="138" stroke="#d0ccc0" stroke-width="0.7" stroke-dasharray="2 3"/>

    <!-- Loecher untere Halbinsel -->
    <g fill="#cbcbcb">
      <circle cx="40" cy="146" r="2"/><circle cx="60" cy="146" r="2"/><circle cx="80" cy="146" r="2"/><circle cx="100" cy="146" r="2"/><circle cx="120" cy="146" r="2"/><circle cx="140" cy="146" r="2"/><circle cx="160" cy="146" r="2"/><circle cx="180" cy="146" r="2"/><circle cx="200" cy="146" r="2"/><circle cx="220" cy="146" r="2"/><circle cx="240" cy="146" r="2"/><circle cx="260" cy="146" r="2"/><circle cx="280" cy="146" r="2"/>
      <circle cx="40" cy="164" r="2"/><circle cx="60" cy="164" r="2"/><circle cx="80" cy="164" r="2"/><circle cx="100" cy="164" r="2"/><circle cx="120" cy="164" r="2"/><circle cx="140" cy="164" r="2"/><circle cx="160" cy="164" r="2"/><circle cx="180" cy="164" r="2"/><circle cx="200" cy="164" r="2"/><circle cx="220" cy="164" r="2"/><circle cx="240" cy="164" r="2"/><circle cx="260" cy="164" r="2"/><circle cx="280" cy="164" r="2"/>
      <circle cx="40" cy="182" r="2"/><circle cx="60" cy="182" r="2"/><circle cx="80" cy="182" r="2"/><circle cx="100" cy="182" r="2"/><circle cx="120" cy="182" r="2"/><circle cx="140" cy="182" r="2"/><circle cx="160" cy="182" r="2"/><circle cx="180" cy="182" r="2"/><circle cx="200" cy="182" r="2"/><circle cx="220" cy="182" r="2"/><circle cx="240" cy="182" r="2"/><circle cx="260" cy="182" r="2"/><circle cx="280" cy="182" r="2"/>
      <circle cx="40" cy="200" r="2"/><circle cx="60" cy="200" r="2"/><circle cx="80" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="120" cy="200" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="160" cy="200" r="2"/><circle cx="180" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="220" cy="200" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="260" cy="200" r="2"/><circle cx="280" cy="200" r="2"/>
    </g>

    <!-- ===== Verbindungs-Jumper: +Schiene -> a3 (rotes Kabel) ===== -->
    <line x1="80" y1="24" x2="80" y2="47" stroke="#d62828" stroke-width="2.5"/>
    <circle cx="80" cy="24" r="2.5" fill="#d62828"/>
    <circle cx="80" cy="47" r="2.5" fill="#d62828"/>

    <!-- ===== Verbindungs-Jumper: +Schiene -> Servo VCC (rotes Kabel, fluechtig nach unten zum Servo) ===== -->
    <line x1="160" y1="24" x2="160" y2="240" stroke="#d62828" stroke-width="2.5"/>
    <circle cx="160" cy="24" r="2.5" fill="#d62828"/>

    <!-- ===== Verbindungs-Jumper: -Schiene -> Servo GND (schwarzes Kabel) ===== -->
    <line x1="200" y1="220" x2="200" y2="240" stroke="#222" stroke-width="2.5"/>
    <circle cx="200" cy="220" r="2.5" fill="#222"/>

    <!-- ===== Verbindungs-Jumper: Spalte 10 (a10) - oranges Kabel kommt von oben (Pin 9) ===== -->
    <line x1="200" y1="47" x2="200" y2="65" stroke="#E67E22" stroke-width="2.5"/>
    <circle cx="200" cy="65" r="2.5" fill="#E67E22"/>
    <!-- Verbindung weiter zum Servo Signal -->
    <line x1="240" y1="47" x2="240" y2="240" stroke="#E67E22" stroke-width="2.5"/>
    <circle cx="240" cy="47" r="2.5" fill="#E67E22"/>
  </g>

  <!-- ===================== SERVO SG90 (rechts unten) ===================== -->
  <g id="servo" transform="translate(220, 470)">
    <!-- Servo-Gehaeuse -->
    <rect x="0" y="0" width="100" height="55" rx="3" fill="url(#servoBody)" stroke="#1e40af" stroke-width="1.5"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">SG90</text>

    <!-- Servo-Arm (oben) -->
    <rect x="35" y="-15" width="30" height="18" rx="2" fill="url(#servoArm)" stroke="#888" stroke-width="1"/>
    <circle cx="50" cy="-6" r="3" fill="#222"/>

    <!-- 3 Pins-Eingang am Servo (links) -->
    <rect x="-15" y="10" width="18" height="35" rx="2" fill="#1e40af" stroke="#0f172a" stroke-width="1"/>
    <!-- 3 farbige Drahtenden, gehen zum Breadboard -->
    <line x1="-15" y1="18" x2="-40" y2="18" stroke="#d62828" stroke-width="2.5"/>
    <line x1="-15" y1="28" x2="-40" y2="28" stroke="#222" stroke-width="2.5"/>
    <line x1="-15" y1="38" x2="-40" y2="38" stroke="#E67E22" stroke-width="2.5"/>

    <!-- Beschriftungen -->
    <text x="-43" y="22" text-anchor="end" font-size="9" fill="#d62828" font-weight="bold">+ (rot)</text>
    <text x="-43" y="32" text-anchor="end" font-size="9" fill="#222" font-weight="bold">- (schwarz)</text>
    <text x="-43" y="42" text-anchor="end" font-size="9" fill="#E67E22" font-weight="bold">Signal (orange)</text>
  </g>

  <!-- ===================== HINWEIS-BOX ===================== -->
  <g transform="translate(360, 470)">
    <rect x="0" y="0" width="340" height="60" rx="6" fill="#fff8e1" stroke="#ffb300" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" font-weight="bold" fill="#5d4118">Wichtig:</text>
    <text x="80" y="22" font-size="11" fill="#5d4118"><tspan font-weight="bold">Polung nicht vertauschen!</tspan></text>
    <text x="20" y="38" font-size="11" fill="#5d4118">Rot &rarr; +5V (Versorgung)</text>
    <text x="20" y="52" font-size="11" fill="#5d4118">Braun/Schwarz &rarr; GND &middot; Orange/Gelb &rarr; Pin 9</text>
  </g>
</svg>
