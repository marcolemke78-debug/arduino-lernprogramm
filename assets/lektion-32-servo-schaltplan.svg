<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="system-ui, -apple-system, sans-serif">
  <title>Schaltplan: Servomotor an Arduino-Pin 9 (mit 5V und GND)</title>

  <rect x="0" y="0" width="480" height="360" rx="8" fill="#fdfdfd" stroke="#dee2e6" stroke-width="1"/>

  <!-- Titel -->
  <text x="240" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Schaltplan: Servomotor an Pin 9</text>

  <!-- Arduino-Pin-Block links -->
  <g id="arduino-pins" transform="translate(50, 60)">
    <rect x="0" y="0" width="120" height="220" rx="6" fill="#e8f4f4" stroke="#005c61" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#005c61">Arduino-Pins</text>

    <!-- 5V -->
    <rect x="10" y="40" width="100" height="36" rx="3" fill="#fff" stroke="#C0392B" stroke-width="1.5"/>
    <text x="60" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#C0392B">5V</text>
    <!-- Anschluss-Punkt rechts -->
    <circle cx="120" cy="58" r="4" fill="#C0392B"/>

    <!-- GND -->
    <rect x="10" y="92" width="100" height="36" rx="3" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <text x="60" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">GND</text>
    <circle cx="120" cy="110" r="4" fill="#222"/>

    <!-- Pin 9 -->
    <rect x="10" y="160" width="100" height="36" rx="3" fill="#fff" stroke="#E67E22" stroke-width="1.5"/>
    <text x="60" y="182" text-anchor="middle" font-size="14" font-weight="bold" fill="#E67E22">Pin 9</text>
    <text x="60" y="200" text-anchor="middle" font-size="9" fill="#666">(digital)</text>
    <circle cx="120" cy="178" r="4" fill="#E67E22"/>
  </g>

  <!-- Verbindungs-Leitungen zum Servo -->
  <!-- Rot: 5V -> Servo VCC -->
  <line x1="170" y1="118" x2="270" y2="118" stroke="#C0392B" stroke-width="2.5"/>
  <line x1="270" y1="118" x2="270" y2="135" stroke="#C0392B" stroke-width="2.5"/>
  <!-- Schwarz: GND -> Servo GND -->
  <line x1="170" y1="170" x2="300" y2="170" stroke="#222" stroke-width="2.5"/>
  <line x1="300" y1="170" x2="300" y2="180" stroke="#222" stroke-width="2.5"/>
  <!-- Orange: Pin9 -> Servo Signal -->
  <line x1="170" y1="238" x2="330" y2="238" stroke="#E67E22" stroke-width="2.5"/>
  <line x1="330" y1="238" x2="330" y2="225" stroke="#E67E22" stroke-width="2.5"/>

  <!-- Servo-Symbol -->
  <g id="servo" transform="translate(260, 135)">
    <rect x="0" y="0" width="120" height="90" rx="6" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="36" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">SERVO</text>
    <text x="60" y="55" text-anchor="middle" font-size="11" fill="#dbeafe">SG90</text>

    <!-- Drei Pin-Markierungen -->
    <circle cx="10" cy="0" r="4" fill="#C0392B"/>
    <text x="10" y="-8" text-anchor="middle" font-size="9" font-weight="bold" fill="#C0392B">VCC</text>

    <circle cx="40" cy="45" r="4" fill="#222"/>
    <text x="60" y="74" text-anchor="middle" font-size="10" fill="#dbeafe">(GND)</text>

    <circle cx="70" cy="90" r="4" fill="#E67E22"/>
    <text x="70" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#E67E22">Signal</text>

    <!-- Drehpfeil andeuten (rechts neben dem Servo) -->
    <circle cx="140" cy="45" r="22" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="3 2"/>
    <path d="M 140 23 A 22 22 0 0 1 162 45" fill="none" stroke="#1e40af" stroke-width="2"/>
    <polygon points="162,45 158,42 158,49" fill="#1e40af"/>
    <text x="140" y="80" text-anchor="middle" font-size="10" font-style="italic" fill="#1e40af">0&#176; - 180&#176;</text>
  </g>

  <!-- Beschriftung Servo-Arm-Symbol -->
  <text x="300" y="115" text-anchor="middle" font-size="11" font-style="italic" fill="#666">Position einstellbar zwischen 0&#176; und 180&#176;</text>

  <!-- Hinweis-Text unten -->
  <text x="240" y="340" text-anchor="middle" font-size="11" fill="#666" font-style="italic">3 Verbindungen: rot zu +5V, schwarz/braun zu GND, orange/gelb zum Steuer-Pin (z.B. 9)</text>
</svg>
