<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 775" width="100%" style="max-width: 760px; height: auto; font-family: 'Helvetica Neue', Arial, sans-serif;">

  <defs>
    <linearGradient id="motorBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="50%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="bc547Body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="760" height="775" fill="#fdfcf6"/>

  <!-- ===================== ARDUINO UNO ===================== -->
  <g id="arduino" transform="translate(200, 30)">
    <rect x="0" y="0" width="360" height="120" rx="10" fill="#00979d" stroke="#005c61" stroke-width="2"/>
    <rect x="355" y="20" width="35" height="30" fill="#9ea7ac" stroke="#444" stroke-width="1.5"/>
    <text x="180" y="65" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15" letter-spacing="2">ARDUINO UNO</text>
    <text x="180" y="83" text-anchor="middle" fill="#cfeeed" font-size="11">5V, GND und Pin 9 werden genutzt</text>

    <!-- Pin-Labels oberhalb der Pin-Boxes -->
    <text x="34" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">5V</text>
    <text x="134" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">GND</text>
    <text x="234" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Pin 9</text>

    <!-- Pin-Leiste unten -->
    <rect x="20" y="115" width="320" height="13" fill="#1a1a1a"/>
    <g fill="#3a3a3a">
      <rect x="30" y="117" width="9" height="10"/>
      <rect x="50" y="117" width="9" height="10"/>
      <rect x="70" y="117" width="9" height="10"/>
      <rect x="90" y="117" width="9" height="10"/>
      <rect x="110" y="117" width="9" height="10"/>
      <rect x="130" y="117" width="9" height="10"/>
      <rect x="150" y="117" width="9" height="10"/>
      <rect x="170" y="117" width="9" height="10"/>
      <rect x="190" y="117" width="9" height="10"/>
      <rect x="210" y="117" width="9" height="10"/>
      <rect x="230" y="117" width="9" height="10"/>
      <rect x="250" y="117" width="9" height="10"/>
      <rect x="270" y="117" width="9" height="10"/>
      <rect x="290" y="117" width="9" height="10"/>
      <rect x="310" y="117" width="9" height="10"/>
    </g>

    <!-- 5V Pin (ROT) -->
    <rect x="29" y="116" width="11" height="12" fill="#d62828" stroke="#fff" stroke-width="1"/>
    <!-- GND Pin (SCHWARZ) -->
    <rect x="129" y="116" width="11" height="12" fill="#222" stroke="#fff" stroke-width="1"/>
    <!-- Pin 9 (ORANGE) -->
    <rect x="229" y="116" width="11" height="12" fill="#E67E22" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ===================== JUMPER ARDUINO -> BREADBOARD ===================== -->
  <!-- ROT: 5V (absolut 234) -> +Schiene-Loch in Spalte 3 (absolut 140, 251) - sanfter Bogen damit das "+5V"-Label sichtbar bleibt -->
  <path d="M 234 180 C 200 200, 170 215, 140 244" stroke="#d62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="234" cy="180" r="3.5" fill="#d62828"/>
  <circle cx="140" cy="244" r="3.5" fill="#d62828"/>

  <!-- SCHWARZ: GND (absolut 334) -> -Schiene-Loch (absolut 100, 444) — verlaeuft LINKS aussen ums Breadboard -->
  <path d="M 334 180 L 334 205 L 40 205 L 40 470 L 100 470 L 100 444" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="334" cy="180" r="3.5" fill="#222"/>
  <circle cx="100" cy="444" r="6" fill="#222" stroke="#fff" stroke-width="1.5"/>
  <text x="100" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">GND in &#8722;Schiene</text>

  <!-- ORANGE/GELB: Pin 9 (absolut 434) -> col 14 row b (absolut 360, 299) -->
  <path d="M 434 180 L 434 220 L 360 220 L 360 299" stroke="#E67E22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="434" cy="180" r="3.5" fill="#E67E22"/>
  <circle cx="360" cy="299" r="3.5" fill="#E67E22"/>

  <!-- ===================== BREADBOARD ===================== -->
  <g id="breadboard" transform="translate(60, 234)">
    <rect x="0" y="0" width="640" height="230" rx="6" fill="#f0ede6" stroke="#c8c3b8" stroke-width="1.5"/>

    <!-- +Schiene oben (rot) -->
    <rect x="20" y="10" width="600" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.7"/>
    <text x="12" y="20" font-size="11" font-weight="bold" fill="#EF4444">+</text>

    <!-- -Schiene unten (blau) -->
    <rect x="20" y="206" width="600" height="14" rx="2" fill="#BFDBFE" stroke="#3B82F6" stroke-width="0.7"/>
    <text x="12" y="217" font-size="11" font-weight="bold" fill="#3B82F6">&#8722;</text>

    <!-- Spaltennummern -->
    <g font-size="8" fill="#888" text-anchor="middle">
      <text x="40" y="38">1</text><text x="60" y="38">2</text><text x="80" y="38">3</text><text x="100" y="38">4</text><text x="120" y="38">5</text>
      <text x="140" y="38">6</text><text x="160" y="38">7</text><text x="180" y="38">8</text><text x="200" y="38">9</text><text x="220" y="38">10</text>
      <text x="240" y="38">11</text><text x="260" y="38">12</text><text x="280" y="38">13</text><text x="300" y="38">14</text><text x="320" y="38">15</text>
    </g>

    <!-- Reihen-Beschriftung obere Halbinsel -->
    <g font-size="9" fill="#999">
      <text x="12" y="50">a</text><text x="12" y="68">b</text><text x="12" y="86">c</text><text x="12" y="104">d</text><text x="12" y="122">e</text>
    </g>

    <!-- Loecher obere Halbinsel -->
    <g fill="#cbcbcb">
      <circle cx="40" cy="47" r="2"/><circle cx="60" cy="47" r="2"/><circle cx="80" cy="47" r="2"/><circle cx="100" cy="47" r="2"/><circle cx="120" cy="47" r="2"/><circle cx="140" cy="47" r="2"/><circle cx="160" cy="47" r="2"/><circle cx="180" cy="47" r="2"/><circle cx="200" cy="47" r="2"/><circle cx="220" cy="47" r="2"/><circle cx="240" cy="47" r="2"/><circle cx="260" cy="47" r="2"/><circle cx="280" cy="47" r="2"/><circle cx="300" cy="47" r="2"/><circle cx="320" cy="47" r="2"/>
      <circle cx="40" cy="65" r="2"/><circle cx="60" cy="65" r="2"/><circle cx="80" cy="65" r="2"/><circle cx="100" cy="65" r="2"/><circle cx="120" cy="65" r="2"/><circle cx="140" cy="65" r="2"/><circle cx="160" cy="65" r="2"/><circle cx="180" cy="65" r="2"/><circle cx="200" cy="65" r="2"/><circle cx="220" cy="65" r="2"/><circle cx="240" cy="65" r="2"/><circle cx="260" cy="65" r="2"/><circle cx="280" cy="65" r="2"/><circle cx="300" cy="65" r="2"/><circle cx="320" cy="65" r="2"/>
      <circle cx="40" cy="83" r="2"/><circle cx="60" cy="83" r="2"/><circle cx="80" cy="83" r="2"/><circle cx="100" cy="83" r="2"/><circle cx="120" cy="83" r="2"/><circle cx="140" cy="83" r="2"/><circle cx="160" cy="83" r="2"/><circle cx="180" cy="83" r="2"/><circle cx="200" cy="83" r="2"/><circle cx="220" cy="83" r="2"/><circle cx="240" cy="83" r="2"/><circle cx="260" cy="83" r="2"/><circle cx="280" cy="83" r="2"/><circle cx="300" cy="83" r="2"/><circle cx="320" cy="83" r="2"/>
      <circle cx="40" cy="101" r="2"/><circle cx="60" cy="101" r="2"/><circle cx="80" cy="101" r="2"/><circle cx="100" cy="101" r="2"/><circle cx="120" cy="101" r="2"/><circle cx="140" cy="101" r="2"/><circle cx="160" cy="101" r="2"/><circle cx="180" cy="101" r="2"/><circle cx="200" cy="101" r="2"/><circle cx="220" cy="101" r="2"/><circle cx="240" cy="101" r="2"/><circle cx="260" cy="101" r="2"/><circle cx="280" cy="101" r="2"/><circle cx="300" cy="101" r="2"/><circle cx="320" cy="101" r="2"/>
      <circle cx="40" cy="119" r="2"/><circle cx="60" cy="119" r="2"/><circle cx="80" cy="119" r="2"/><circle cx="100" cy="119" r="2"/><circle cx="120" cy="119" r="2"/><circle cx="140" cy="119" r="2"/><circle cx="160" cy="119" r="2"/><circle cx="180" cy="119" r="2"/><circle cx="200" cy="119" r="2"/><circle cx="220" cy="119" r="2"/><circle cx="240" cy="119" r="2"/><circle cx="260" cy="119" r="2"/><circle cx="280" cy="119" r="2"/><circle cx="300" cy="119" r="2"/><circle cx="320" cy="119" r="2"/>
    </g>

    <line x1="20" y1="138" x2="620" y2="138" stroke="#d0ccc0" stroke-width="0.7" stroke-dasharray="2 3"/>

    <!-- Loecher untere Halbinsel -->
    <g fill="#cbcbcb">
      <circle cx="40" cy="146" r="2"/><circle cx="60" cy="146" r="2"/><circle cx="80" cy="146" r="2"/><circle cx="100" cy="146" r="2"/><circle cx="120" cy="146" r="2"/><circle cx="140" cy="146" r="2"/><circle cx="160" cy="146" r="2"/><circle cx="180" cy="146" r="2"/><circle cx="200" cy="146" r="2"/><circle cx="220" cy="146" r="2"/><circle cx="240" cy="146" r="2"/><circle cx="260" cy="146" r="2"/><circle cx="280" cy="146" r="2"/><circle cx="300" cy="146" r="2"/><circle cx="320" cy="146" r="2"/>
      <circle cx="40" cy="164" r="2"/><circle cx="60" cy="164" r="2"/><circle cx="80" cy="164" r="2"/><circle cx="100" cy="164" r="2"/><circle cx="120" cy="164" r="2"/><circle cx="140" cy="164" r="2"/><circle cx="160" cy="164" r="2"/><circle cx="180" cy="164" r="2"/><circle cx="200" cy="164" r="2"/><circle cx="220" cy="164" r="2"/><circle cx="240" cy="164" r="2"/><circle cx="260" cy="164" r="2"/><circle cx="280" cy="164" r="2"/><circle cx="300" cy="164" r="2"/><circle cx="320" cy="164" r="2"/>
      <circle cx="40" cy="182" r="2"/><circle cx="60" cy="182" r="2"/><circle cx="80" cy="182" r="2"/><circle cx="100" cy="182" r="2"/><circle cx="120" cy="182" r="2"/><circle cx="140" cy="182" r="2"/><circle cx="160" cy="182" r="2"/><circle cx="180" cy="182" r="2"/><circle cx="200" cy="182" r="2"/><circle cx="220" cy="182" r="2"/><circle cx="240" cy="182" r="2"/><circle cx="260" cy="182" r="2"/><circle cx="280" cy="182" r="2"/><circle cx="300" cy="182" r="2"/><circle cx="320" cy="182" r="2"/>
      <circle cx="40" cy="200" r="2"/><circle cx="60" cy="200" r="2"/><circle cx="80" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="120" cy="200" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="160" cy="200" r="2"/><circle cx="180" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="220" cy="200" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="260" cy="200" r="2"/><circle cx="280" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="320" cy="200" r="2"/>
    </g>

    <!-- ===== KOMPONENTEN auf dem BREADBOARD ===== -->

    <!-- DIODE 1N4148 (vertikal in Spalte 10, zwischen +Schiene und Reihe a) -->
    <!-- Kathode (Ring) oben an +Schiene, Anode unten in col 10 row a -->
    <g id="diode">
      <!-- Glasgehaeuse vertikal -->
      <rect x="216" y="22" width="8" height="22" rx="1.5" fill="#f8d27a" stroke="#5d4118" stroke-width="1"/>
      <!-- Schwarzer Ring nahe Kathode (oben) -->
      <rect x="216" y="24" width="8" height="2.5" fill="#1a1a1a"/>
      <!-- Anschluss-Drahtenden -->
      <line x1="220" y1="17" x2="220" y2="22" stroke="#9ca3af" stroke-width="1.5"/>
      <line x1="220" y1="44" x2="220" y2="47" stroke="#9ca3af" stroke-width="1.5"/>
    </g>

    <!-- BC547 TRANSISTOR -->
    <!-- Beine in Spalten 10, 11, 12 in Reihe e (y=119) -->
    <!-- Gehaeuse sitzt im Trennzonenbereich, Beine fuehren von oben hinein -->
    <g id="bc547">
      <!-- Beine -->
      <line x1="220" y1="119" x2="220" y2="148" stroke="#9ca3af" stroke-width="2"/>
      <line x1="240" y1="119" x2="240" y2="148" stroke="#9ca3af" stroke-width="2"/>
      <line x1="260" y1="119" x2="260" y2="148" stroke="#9ca3af" stroke-width="2"/>

      <!-- Halbkreis-Gehaeuse TO-92 (flache Seite oben, Bauch nach unten) -->
      <path d="M 208 148 L 272 148 A 32 32 0 0 0 208 148 Z" fill="url(#bc547Body)" stroke="#000" stroke-width="1.5"/>

      <!-- Bauteil-Bezeichnung gross + zentriert im Gehaeuse -->
      <text x="240" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" letter-spacing="0.5">BC547</text>

      <!-- Pin-Labels OBERHALB der Beine, klar erkennbar -->
      <text x="220" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0392B">C</text>
      <text x="240" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980B9">B</text>
      <text x="260" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">E</text>
    </g>

    <!-- (Hinweis "flache Seite zu DIR" steht in der Hinweis-Box unten — kein Doppel-Label hier mehr) -->

    <!-- BASISWIDERSTAND 1 kOhm (horizontal in Reihe d, col 11 -> col 14) -->
    <g id="resistor">
      <!-- Drahtenden -->
      <line x1="240" y1="101" x2="252" y2="101" stroke="#9ca3af" stroke-width="1.5"/>
      <line x1="288" y1="101" x2="300" y2="101" stroke="#9ca3af" stroke-width="1.5"/>
      <!-- Widerstandskoerper beige -->
      <rect x="252" y="95" width="36" height="12" rx="2" fill="#d4b896" stroke="#8b7355" stroke-width="1"/>
      <!-- Farbringe 1kOhm = braun, schwarz, rot, gold -->
      <rect x="256" y="95" width="2.5" height="12" fill="#5d4118"/>
      <rect x="261" y="95" width="2.5" height="12" fill="#000"/>
      <rect x="266" y="95" width="2.5" height="12" fill="#d62828"/>
      <rect x="282" y="95" width="2.5" height="12" fill="#d4a017"/>
      <!-- Beschriftung -->
      <text x="270" y="89" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">1 k&#937;</text>
    </g>

    <!-- JUMPER: Emitter-Spalte 12 row a (Loch frei, oberhalb des Widerstands) -> -Schiene col 13.
         Bogen weit rechts vorbei, damit das Kabel weder durch den Widerstand-Body
         noch direkt darueber verlaeuft. col 12 row a ist elektrisch mit dem Emitter-Bein in row e verbunden. -->
    <path d="M 260 47 C 380 60, 380 195, 280 213" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="260" cy="47" r="3.5" fill="#222"/>
    <circle cx="280" cy="213" r="3.5" fill="#222"/>

    <!-- ===== Markierungs-Kreise mit Beschriftung ===== -->
    <!-- Markierung +Schiene-Loch col 3 (5V vom Arduino) -->
    <circle cx="80" cy="17" r="7" fill="none" stroke="#d62828" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="80" y="-4" text-anchor="middle" font-size="10" font-weight="bold" fill="#d62828">+5V</text>

    <!-- Markierung +Schiene-Loch col 6 (Motor +) -->
    <circle cx="140" cy="17" r="7" fill="none" stroke="#d62828" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="140" y="-4" text-anchor="middle" font-size="10" font-weight="bold" fill="#d62828">Motor +</text>

    <!-- Markierung +Schiene-Loch col 10 (Diode-Ring/Kathode) -->
    <circle cx="220" cy="17" r="7" fill="none" stroke="#d62828" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="220" y="-4" text-anchor="middle" font-size="10" font-weight="bold" fill="#d62828">Diode-Ring</text>

    <!-- Markierung col 10 row b (Motor -) - direkt unter der Diode-Anode in row a -->
    <!-- Label RECHTS vom Kreis, weg vom roten Motor+-Kabel-Pfad -->
    <circle cx="220" cy="65" r="7" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="232" y="68" text-anchor="start" font-size="10" font-weight="bold" fill="#222">Motor &#8722;</text>

    <!-- Markierung col 14 row b (Pin 9 Eingang) -->
    <circle cx="300" cy="65" r="7" fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="335" y="68" font-size="10" font-weight="bold" fill="#E67E22">Pin 9</text>

  </g>

  <!-- ===================== DC-MOTOR ===================== -->
  <g id="motor" transform="translate(320, 580)">
    <!-- Motor-Zylinder -->
    <rect x="0" y="0" width="120" height="70" rx="35" fill="url(#motorBody)" stroke="#374151" stroke-width="2"/>
    <text x="60" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">M</text>
    <text x="60" y="58" text-anchor="middle" font-size="9" fill="#e5e7eb">DC-Motor 3-6V</text>

    <!-- Achse -->
    <rect x="120" y="30" width="20" height="10" fill="#9ca3af" stroke="#374151" stroke-width="1"/>

    <!-- Anschluss-Tabs links -->
    <rect x="-6" y="15" width="6" height="10" fill="#d62828" stroke="#222" stroke-width="0.7"/>
    <rect x="-6" y="45" width="6" height="10" fill="#222" stroke="#222" stroke-width="0.7"/>

    <!-- Polung Labels -->
    <text x="-12" y="22" text-anchor="end" font-size="11" font-weight="bold" fill="#d62828">+</text>
    <text x="-12" y="52" text-anchor="end" font-size="11" font-weight="bold" fill="#222">&#8722;</text>
  </g>

  <!-- ===================== DRAEHTE MOTOR -> BREADBOARD ===================== -->
  <!-- Motor-Plus-Tab absolut: (320-6, 580+20) = (314, 600) -->
  <!-- Motor-Minus-Tab absolut: (320-6, 580+50) = (314, 630) -->
  <!-- Ziel +Schiene col 6: (60+140, 234+17) = (200, 251) -->
  <!-- Ziel col 10 row c: (60+220, 234+83) = (280, 317) -->

  <!-- ROT: Motor + -> +Schiene col 6 -->
  <path d="M 314 600 C 250 540, 220 380, 200 251" stroke="#d62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="314" cy="600" r="3.5" fill="#d62828"/>
  <circle cx="200" cy="251" r="3.5" fill="#d62828"/>

  <!-- SCHWARZ: Motor - -> col 10 row b. Rechtwinklig RECHTS am Transistor-Gehaeuse vorbei,
       damit das Kabel nicht durch den Transistor laeuft. -->
  <path d="M 314 630 L 314 678 L 395 678 L 395 270 L 280 270 L 280 299" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="314" cy="630" r="3.5" fill="#1a1a1a"/>
  <circle cx="280" cy="299" r="3.5" fill="#1a1a1a"/>

  <!-- ===================== STROMFLUSS-HINWEIS (didaktisch) ===================== -->
  <g transform="translate(490, 540)">
    <rect x="0" y="0" width="240" height="120" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="12" y="22" font-size="11" font-weight="bold" fill="#065f46">Stromfluss bei Pin 9 = HIGH</text>
    <text x="12" y="44" font-size="10" fill="#065f46">1. +5V &#8594; +Schiene</text>
    <text x="12" y="60" font-size="10" fill="#065f46">2. +Schiene &#8594; Motor +</text>
    <text x="12" y="76" font-size="10" fill="#065f46">3. Motor &#8722; &#8594; Collector (C)</text>
    <text x="12" y="92" font-size="10" fill="#065f46">4. C &#8594; durch Transistor &#8594; E</text>
    <text x="12" y="108" font-size="10" fill="#065f46">5. E &#8594; &#8722;Schiene &#8594; GND</text>
  </g>

  <!-- ===================== HINWEIS-BOX UNTEN ===================== -->
  <g transform="translate(60, 690)">
    <rect x="0" y="0" width="680" height="80" rx="6" fill="#fff8e1" stroke="#ffb300" stroke-width="1.5"/>
    <text x="14" y="18" font-size="12" font-weight="bold" fill="#5d4118">Wichtige Pruefpunkte vor dem Einschalten:</text>
    <text x="14" y="34" font-size="11" fill="#5d4118"><tspan font-weight="bold" fill="#d62828">Diode-Ring</tspan> oben an der +Schiene (sonst Kurzschluss!) &#183; <tspan font-weight="bold" fill="#2980B9">Basiswiderstand</tspan> zwischen Pin 9 und B (sonst stirbt der Arduino-Pin)</text>
    <text x="14" y="48" font-size="11" fill="#5d4118"><tspan font-weight="bold">BC547</tspan> mit flacher Seite nach VORN: C-B-E von links &#183; <tspan font-weight="bold">Motor</tspan> auf zwei Spalten verteilt (+Schiene und col 10)</text>
    <text x="14" y="68" font-size="11" fill="#5d4118"><tspan font-weight="bold">Lesehilfe:</tspan> <tspan font-style="italic">Gestrichelte Kreise</tspan> markieren, wo ein Kabel oder Bauteilbein ins Breadboard kommt (Farbe = Funktion).</text>
  </g>
</svg>
