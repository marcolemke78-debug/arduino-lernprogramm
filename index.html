<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino Uno – Lernprogramm Technik 9/10</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="menu-toggle" id="menu-toggle">&#9776;</button>
  <aside id="sidebar">
    <h2>Lektionen</h2>
    <div id="module-grundlagen">
      <h3>Modul 1 – Grundlagen</h3>
      <ul id="lesson-list-grundlagen"></ul>
    </div>
    <div id="module-digital">
      <h3>Modul 2 – Digitale Welt</h3>
      <ul id="lesson-list-digital"></ul>
    </div>
    <div id="module-analog">
      <h3>Modul 3 – Analoge Welt</h3>
      <ul id="lesson-list-analog"></ul>
    </div>
    <div id="module-aktoren">
      <h3>Modul 4 – Aktoren erweitert</h3>
      <ul id="lesson-list-aktoren"></ul>
    </div>
    <div id="module-projekt">
      <h3>Modul 5 – Prüfungsprojekt</h3>
      <ul id="lesson-list-projekt"></ul>
    </div>
    <button id="reset-progress">Fortschritt zurücksetzen</button>
  </aside>
  <main id="content">
    <div id="progress-section">
      <div id="progress-label">0 % – 0 von 0 Lektionen abgeschlossen</div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
    </div>
    <div id="lesson-container"></div>
  </main>
  <script src="js/progress.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/lessons-grundlagen.js"></script>
  <script src="js/lessons-digital.js"></script>
  <script src="js/lessons-analog.js"></script>
  <script src="js/lessons-aktoren.js"></script>
  <script src="js/lessons-projekt.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
